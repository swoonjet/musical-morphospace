<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Musical Morphospace — Corpus Review</title>
<style>
  :root {
    --bg: #0a0a0a;
    --bg-2: #121212;
    --bg-3: #1a1a1a;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --text-dim: #888;
    --text-faint: #555;
    --gold: #c9a962;
    --blue: #4a90e2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', 'SF Mono', Menlo, monospace;
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }
  body { padding: 32px 40px 220px; }

  h1 {
    font-family: 'Space Grotesk', -apple-system, sans-serif;
    font-weight: 500;
    font-size: 28px;
    letter-spacing: -0.02em;
    margin-bottom: 4px;
  }
  .subtitle { color: var(--text-dim); font-size: 13px; margin-bottom: 8px; }
  .meta { color: var(--text-faint); font-size: 11px; margin-bottom: 28px; }

  .controls {
    display: flex;
    gap: 16px;
    align-items: center;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--text-dim);
    flex-wrap: wrap;
  }
  .controls button {
    background: var(--bg-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 6px 12px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }
  .controls button:hover { border-color: var(--gold); color: var(--gold); }
  .controls button.active {
    background: var(--gold);
    color: var(--bg);
    border-color: var(--gold);
  }
  .controls label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
  }
  .sort-indicator { color: var(--gold); }
  .count-badge {
    color: var(--text);
    background: var(--bg-3);
    padding: 2px 8px;
    border: 1px solid var(--border);
    font-size: 11px;
  }

  .matrix-wrap {
    overflow-x: auto;
    overflow-y: visible;
    padding-top: 120px;
    margin-top: -120px;
  }
  table.matrix { border-collapse: collapse; font-size: 11px; }
  table.matrix th.name-col, table.matrix td.name-col {
    text-align: right;
    padding: 6px 12px 6px 0;
    min-width: 260px;
    max-width: 260px;
    font-size: 11px;
    position: sticky;
    left: 0;
    background: var(--bg);
    z-index: 2;
    border-right: 1px solid var(--border);
  }
  table.matrix td.name-col {
    color: var(--text);
    cursor: pointer;
    user-select: none;
    position: relative;
  }
  table.matrix td.name-col:hover { color: var(--gold); }
  table.matrix tr.selected td.name-col { color: var(--gold); font-weight: 500; }
  table.matrix td.name-col .anchor-dot {
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gold);
    margin-left: 8px;
    vertical-align: middle;
  }

  table.matrix th.dim-col {
    height: 120px;
    vertical-align: bottom;
    padding: 0;
    position: relative;
    width: 42px;
    min-width: 42px;
    max-width: 42px;
  }
  table.matrix th.dim-col .dim-label {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform-origin: 0 50%;
    transform: rotate(-60deg);
    white-space: nowrap;
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 0.02em;
    cursor: pointer;
    user-select: none;
  }
  table.matrix th.dim-col .dim-label:hover { color: var(--gold); }
  table.matrix th.dim-col.sorted .dim-label { color: var(--gold); }

  table.matrix td.cell {
    width: 42px;
    min-width: 42px;
    max-width: 42px;
    height: 24px;
    text-align: center;
    font-size: 9px;
    cursor: default;
    position: relative;
    border-right: 1px solid rgba(255,255,255,0.02);
  }
  table.matrix td.cell .val { position: relative; z-index: 1; }
  table.matrix td.cell.high-val .val { color: #0a0a0a; font-weight: 600; }
  table.matrix td.cell.low-val .val { color: var(--text-faint); }

  table.matrix tr.group-separator td,
  table.matrix th.group-separator { border-left: 1px solid var(--border); }

  table.matrix tr.group-row th {
    height: 24px;
    padding: 6px 0 2px;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-faint);
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  table.matrix tr.group-row th.name-col {
    text-align: right;
    padding-right: 12px;
    border-bottom: 1px solid var(--border);
  }

  table.matrix tr.stats-row td {
    padding-top: 12px;
    padding-bottom: 4px;
    color: var(--text-faint);
    font-size: 9px;
    text-align: center;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  table.matrix tr.stats-row td.name-col { text-align: right; padding-right: 12px; }

  .panel {
    position: fixed;
    top: 0;
    right: 0;
    width: 440px;
    height: 100vh;
    background: var(--bg-2);
    border-left: 1px solid var(--border);
    padding: 32px 28px;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.2s ease;
    z-index: 10;
  }
  .panel.open { transform: translateX(0); }
  .panel .close {
    position: absolute;
    top: 16px;
    right: 20px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
  }
  .panel .close:hover { color: var(--gold); }
  .panel h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 18px;
    margin-bottom: 4px;
    padding-right: 30px;
  }
  .panel .region { color: var(--text-dim); font-size: 11px; margin-bottom: 2px; }
  .panel .example {
    color: var(--text-faint);
    font-size: 11px;
    font-style: italic;
    margin-bottom: 20px;
  }
  .panel .anchor-label {
    display: inline-block;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 1px 6px;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .panel h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-faint);
    margin: 18px 0 8px;
  }
  .panel .cat-grid {
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    gap: 2px 12px;
    font-size: 11px;
  }
  .panel .cat-grid .k { color: var(--text-dim); }
  .panel .cat-grid .v { color: var(--gold); }
  .panel .notes {
    font-size: 12px;
    line-height: 1.6;
    color: var(--text);
    padding: 12px;
    background: var(--bg-3);
    border-left: 2px solid var(--gold);
    margin-top: 6px;
  }

  .legend {
    position: fixed;
    bottom: 16px;
    left: 40px;
    display: flex;
    gap: 24px;
    font-size: 10px;
    color: var(--text-faint);
    align-items: center;
  }
  .legend-gradient {
    width: 200px;
    height: 12px;
    background: linear-gradient(to right, #1a1a1a, #c9a962);
    border: 1px solid var(--border);
  }
  .legend-stops {
    display: flex;
    justify-content: space-between;
    width: 200px;
    margin-top: 2px;
  }
</style>
</head>
<body>

<h1>Musical Morphospace — Corpus Review</h1>
<div class="subtitle">84 traditions × 18 continuous dimensions. Scan down each column to check ordinal rankings.</div>
<div class="meta">Click column header to sort. Click tradition name for categorical values + notes. Gold dot = anchor.</div>

<div class="controls">
  <button id="reset-sort">Reset order</button>
  <button id="sort-name">Sort A–Z</button>
  <button id="toggle-anchors">Anchors only</button>
  <span class="count-badge" id="count">showing 84 / 84</span>
  <span id="sort-status"></span>
</div>

<div class="matrix-wrap">
  <table class="matrix" id="matrix"></table>
</div>

<div class="panel" id="panel">
  <button class="close" id="panel-close">×</button>
  <div id="panel-body"></div>
</div>

<div class="legend">
  <span>value intensity:</span>
  <div>
    <div class="legend-gradient"></div>
    <div class="legend-stops"><span>0.0</span><span>0.5</span><span>1.0</span></div>
  </div>
</div>

"just_intonation", "scale_topology": "non_octave_repeating", "rhythmic_structure": "indeterminate_proportional", "formal_type": "static_contemplation", "texture_type": "drone_based", "ornament_grammar": "forbidden", "transmission_mode": "recorded_reference", "ensemble_topology": "solo", "social_function": "contemplative_personal", "listener_role": "passive_audience", "silence_treatment": "foundational_ground", "temporal_framing": "event_duration"}, "notes": "Just-intonation bowed-string drones emphasizing beating patterns. Formative pre-La Monte Young Theatre of Eternal Music. Shorter duration than Well-Tuned Piano."}, {"id": "inuit_drum_dance_song", "name": "Inuit Drum-Dance Song", "region": "Arctic Canada, Greenland", "example": "Pisiit, aya-yait songs", "is_anchor": false, "continuous": {"pitch_density": 0.06, "microtonality_degree": 0.15, "octave_equivalence": 0.85, "interval_hierarchy": 0.45, "pitch_flexibility": 0.45, "metric_periodicity": 0.85, "rhythmic_density": 0.6, "polyrhythmic_complexity": 0.15, "cycle_length": 0.2, "tempo_stability": 0.8, "piece_duration": 0.15, "formal_repetition": 0.9, "development_arc": 0.25, "voice_count": 0.05, "voice_independence": 0.0, "drone_presence": 0.05, "improvisation_degree": 0.2, "ornament_density": 0.2}, "categorical": {"tuning_basis": "just_intonation", "scale_topology": "octave_repeating", "rhythmic_structure": "isochronous_metric", "formal_type": "cyclical_return", "texture_type": "monophonic", "ornament_grammar": "decorative_optional", "transmission_mode": "oral_only", "ensemble_topology": "solo", "social_function": "narrative_storytelling", "listener_role": "participatory_communal", "silence_treatment": "avoided", "temporal_framing": "natural_cycle_aligned"}, "notes": "Different from katajjaq — this is solo sung narrative with frame drum (qilaut). Pisiit are 'personal songs' composed for specific life events."}, {"id": "sardinian_launeddas", "name": "Sardinian Launeddas (triple clarinet)", "region": "Sardinia", "ex const DIM_GROUPS = [
  { name: 'pitch', dims: ['pitch_density', 'microtonality_degree', 'octave_equivalence', 'interval_hierarchy', 'pitch_flexibility'] },
  { name: 'rhythm', dims: ['metric_periodicity', 'rhythmic_density', 'polyrhythmic_complexity', 'cycle_length', 'tempo_stability'] },
  { name: 'form', dims: ['piece_duration', 'formal_repetition', 'development_arc'] },
  { name: 'texture', dims: ['voice_count', 'voice_independence', 'drone_presence'] },
  { name: 'performance', dims: ['improvisation_degree', 'ornament_density'] },
];

const DIMS = DIM_GROUPS.flatMap(g => g.dims);
const ORIGINAL_ORDER = DATA.traditions.map(t => t.id);

let state = {
  sortDim: null,
  sortAsc: false,
  selected: null,
  anchorsOnly: false,
};

function colorForValue(v) {
  const r = Math.round(26 + (201 - 26) * v);
  const g = Math.round(26 + (169 - 26) * v);
  const b = Math.round(26 + (98 - 26) * v);
  return `rgb(${r},${g},${b})`;
}

function getFiltered() {
  let ts = DATA.traditions;
  if (state.anchorsOnly) ts = ts.filter(t => t.is_anchor);
  return ts;
}

function sortTraditions(traditions) {
  if (state.sortDim === 'name') {
    return [...traditions].sort((a, b) => a.name.localeCompare(b.name));
  }
  if (state.sortDim && state.sortDim !== 'original') {
    return [...traditions].sort((a, b) => {
      const av = a.continuous[state.sortDim];
      const bv = b.continuous[state.sortDim];
      return state.sortAsc ? av - bv : bv - av;
    });
  }
  const byId = Object.fromEntries(traditions.map(t => [t.id, t]));
  return ORIGINAL_ORDER.map(id => byId[id]).filter(Boolean);
}

function render() {
  const table = document.getElementById('matrix');
  const filtered = getFiltered();
  const sorted = sortTraditions(filtered);

  document.getElementById('count').textContent = `showing ${filtered.length} / ${DATA.traditions.length}`;

  const stats = {};
  for (const d of DIMS) {
    const vals = filtered.map(t => t.continuous[d]);
    const mean = vals.reduce((a, b) => a + b, 0) / vals.length;
    const min = Math.min(...vals);
    const max = Math.max(...vals);
    stats[d] = { mean, min, max };
  }

  let html = '';

  html += '<tr class="group-row"><th class="name-col">group</th>';
  for (const g of DIM_GROUPS) {
    html += `<th colspan="${g.dims.length}" class="group-separator">${g.name}</th>`;
  }
  html += '</tr>';

  html += '<tr><th class="name-col">tradition ↓ / dimension →</th>';
  DIM_GROUPS.forEach((g) => {
    g.dims.forEach((d, i) => {
      const sortedClass = state.sortDim === d ? 'sorted' : '';
      const sepClass = i === 0 ? 'group-separator' : '';
      const arrow = state.sortDim === d ? (state.sortAsc ? ' ↑' : ' ↓') : '';
      html += `<th class="dim-col ${sortedClass} ${sepClass}"><span class="dim-label" data-dim="${d}">${d}${arrow}</span></th>`;
    });
  });
  html += '</tr>';

  for (const t of sorted) {
    const selClass = state.selected === t.id ? 'selected' : '';
    const anchorDot = t.is_anchor ? '<span class="anchor-dot"></span>' : '';
    html += `<tr class="${selClass}">`;
    html += `<td class="name-col" data-id="${t.id}">${t.name}${anchorDot}</td>`;
    DIM_GROUPS.forEach((g) => {
      g.dims.forEach((d, i) => {
        const v = t.continuous[d];
        const bg = colorForValue(v);
        const sepClass = i === 0 ? 'group-separator' : '';
        const intensity = v > 0.55 ? 'high-val' : (v < 0.1 ? 'low-val' : '');
        html += `<td class="cell ${sepClass} ${intensity}" style="background:${bg}" title="${d}: ${v}"><span class="val">${v.toFixed(2)}</span></td>`;
      });
    });
    html += '</tr>';
  }

  html += '<tr class="stats-row"><td class="name-col">mean</td>';
  DIM_GROUPS.forEach((g) => {
    g.dims.forEach((d, i) => {
      const s = stats[d];
      const sepClass = i === 0 ? 'group-separator' : '';
      html += `<td class="${sepClass}">μ ${s.mean.toFixed(2)}</td>`;
    });
  });
  html += '</tr>';

  html += '<tr class="stats-row"><td class="name-col">min — max</td>';
  DIM_GROUPS.forEach((g) => {
    g.dims.forEach((d, i) => {
      const s = stats[d];
      const sepClass = i === 0 ? 'group-separator' : '';
      html += `<td class="${sepClass}">${s.min.toFixed(2)}–${s.max.toFixed(2)}</td>`;
    });
  });
  html += '</tr>';

  table.innerHTML = html;

  for (const el of table.querySelectorAll('.dim-label')) {
    el.addEventListener('click', () => {
      const d = el.dataset.dim;
      if (state.sortDim === d) {
        state.sortAsc = !state.sortAsc;
      } else {
        state.sortDim = d;
        state.sortAsc = false;
      }
      updateSortStatus();
      render();
    });
  }
  for (const el of table.querySelectorAll('td.name-col[data-id]')) {
    el.addEventListener('click', () => showPanel(el.dataset.id));
  }
}

function updateSortStatus() {
  const el = document.getElementById('sort-status');
  if (!state.sortDim || state.sortDim === 'original') {
    el.textContent = 'default order';
  } else if (state.sortDim === 'name') {
    el.textContent = 'sorted alphabetically';
  } else {
    el.innerHTML = `sorted by <span class="sort-indicator">${state.sortDim}</span> ${state.sortAsc ? '↑ ascending' : '↓ descending'}`;
  }
}

function showPanel(id) {
  const t = DATA.traditions.find(x => x.id === id);
  if (!t) return;
  state.selected = id;
  const body = document.getElementById('panel-body');
  const cats = Object.entries(t.categorical).map(([k, v]) => `<div class="k">${k}</div><div class="v">${v}</div>`).join('');
  const anchorBadge = t.is_anchor ? '<div class="anchor-label">anchor</div>' : '';
  body.innerHTML = `
    <h2>${t.name}</h2>
    <div class="region">${t.region}</div>
    <div class="example">e.g. ${t.example}</div>
    ${anchorBadge}
    <h3>Categorical (12)</h3>
    <div class="cat-grid">${cats}</div>
    <h3>Notes</h3>
    <div class="notes">${t.notes}</div>
  `;
  document.getElementById('panel').classList.add('open');
  render();
}

function closePanel() {
  state.selected = null;
  document.getElementById('panel').classList.remove('open');
  render();
}

document.getElementById('reset-sort').addEventListener('click', () => {
  state.sortDim = null;
  updateSortStatus();
  render();
});
document.getElementById('sort-name').addEventListener('click', () => {
  state.sortDim = 'name';
  updateSortStatus();
  render();
});
document.getElementById('toggle-anchors').addEventListener('click', (e) => {
  state.anchorsOnly = !state.anchorsOnly;
  e.target.classList.toggle('active', state.anchorsOnly);
  render();
});
document.getElementById('panel-close').addEventListener('click', closePanel);

updateSortStatus();
render();
</script>
